<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3c1053"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="24" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="white" opacity="0.07"/>
  <circle cx="700" cy="450" r="80" fill="white" opacity="0.05"/>
  <circle cx="100" cy="500" r="60" fill="white" opacity="0.05"/>
  <!-- Icon area -->
  <g transform="translate(400,240)"><text x="0" y="0" text-anchor="middle" font-family="Georgia,serif" font-size="80" font-weight="700" fill="white">Pp</text>
             <text x="0" y="50" text-anchor="middle" font-family="system-ui" font-size="18" fill="white" opacity="0.7">Элегантный антиквенный шрифт</text></g>
  <!-- Title -->
  <text x="400" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="white">Playfair Display</text>
  <text x="400" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="white" opacity="0.8">Serif / Премиум / Журнальный стиль</text>
  <!-- Badge -->
  <rect x="580" y="20" width="200" height="36" rx="18" fill="#f59e0b"/>
       <text x="680" y="44" text-anchor="middle" font-size="14" font-weight="700" fill="white">299 ₽</text>
  <!-- FORMA watermark -->
  <text x="400" y="560" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="white" opacity="0.4">FORMA Platform</text>
</svg>